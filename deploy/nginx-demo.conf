server {
    listen 80;
    listen [::]:80;
    server_name demo.sanxaydung.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name demo.sanxaydung.vn;

    ssl_certificate /etc/letsencrypt/live/demo.sanxaydung.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.sanxaydung.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/demo.sanxaydung.vn/html;
    index index.html;

    # Trang riêng tư - yêu cầu đăng nhập (Basic Auth)
    auth_basic "Khu vuc rieng tu - San Xay Dung";
    auth_basic_user_file /etc/nginx/.htpasswd-demo;

    # Nén để tải nhanh hơn
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache tài nguyên tĩnh
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/demo.sanxaydung.vn.access.log;
    error_log  /var/log/nginx/demo.sanxaydung.vn.error.log;
}
