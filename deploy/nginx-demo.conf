server {
    listen 80;
    listen [::]:80;
    server_name demo.sanxaydung.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name demo.sanxaydung.vn;

    ssl_certificate /etc/letsencrypt/live/demo.sanxaydung.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.sanxaydung.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # ---- Supabase REST API (PostgREST) — KHÔNG đặt Basic Auth để app gọi được ----
    location /rest/v1/ {
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3411;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Ứng dụng Next.js (trang riêng tư - Basic Auth) ----
    location / {
        auth_basic "Khu vuc rieng tu - San Xay Dung";
        auth_basic_user_file /etc/nginx/.htpasswd-demo;

        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/demo.sanxaydung.vn.access.log;
    error_log  /var/log/nginx/demo.sanxaydung.vn.error.log;
}
